<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Оформлення замовлення</title>
    <link rel="stylesheet" href="style2.css">
    <style>
        body { background-color: #000; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .back-link { position: absolute; top: 20px; left: 20px; color: #555; text-decoration: none; font-size: 12px; text-transform: uppercase; }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>

<a href="index2.html" class="back-link">← Назад</a>

<section class="order-section-sq" style="padding: 40px 20px;">
    <div class="order-container-sq" id="multiselectContainer">
        <div class="form-core">
            <h2 class="form-title-sq">ОФОРМИТИ ЗАМОВЛЕННЯ</h2>
            
            <form id="orderFormSq" class="contact-form-sq">
                <div class="form-group-sq multiselect-wrapper-sq">
                    <div class="select-trigger-sq" id="goodsTrigger">
                        <span id="selectedLabelSq">ОБЕРІТЬ ТОВАР</span>
                        <span class="arrow-icon">▼</span>
                    </div>
                    <div class="dropdown-side-sq" id="goodsDropdown">
                        <label class="check-item-sq">
                            <input type="checkbox" value="Avrobit Detector тридіапазонний" onchange="updateSelectedSq()">
                            <span class="check-box-sq"></span>
                            <span class="check-text-sq">Avrobit Detector тридіапазонний</span>
                        </label>
                    </div>
                </div>

                <div class="form-group-sq">
                    <input type="text" name="name" placeholder="ІМ'Я" required>
                </div>

                <div class="form-group-sq">
                    <input type="tel" name="phone" id="phoneInputSq" value="+380" maxlength="13" placeholder="НОМЕР ТЕЛЕФОНУ" required>
                </div>

                <p class="methods-label-sq">ЯК ЗВ’ЯЗАТИСЯ?</p>

                <div class="contact-methods-sq">
                    <div class="method-tabs">
                        <label class="tab-btn"><input type="radio" name="contact_type" value="telegram" required onclick="handleRadioSq(this)"><span>TELEGRAM</span></label>
                        <label class="tab-btn"><input type="radio" name="contact_type" value="viber" onclick="handleRadioSq(this)"><span>VIBER</span></label>
                        <label class="tab-btn"><input type="radio" name="contact_type" value="whatsapp" onclick="handleRadioSq(this)"><span>WHATSAPP</span></label>
                        <label class="tab-btn"><input type="radio" name="contact_type" value="signal" onclick="handleRadioSq(this)"><span>SIGNAL</span></label>
                        <label class="tab-btn"><input type="radio" name="contact_type" value="gmail" onclick="handleRadioSq(this)"><span>GMAIL</span></label>
                    </div>
                </div>

                <div id="dynamicInputContainerSq" class="form-group-sq dynamic-field hidden">
                    <input type="text" id="dynamicInputSq" name="contact_data" placeholder="">
                </div>

                <div class="form-group-sq captcha-wrapper-sq">
                    <label class="methods-label-sq">Будь ласка, надайте відповідь:</label>
                    <div class="captcha-container-sq">
                        <span id="captchaQuestionSq" style="color: #fff; font-weight: bold; margin-right: 10px;"></span>
                        <input type="number" id="captchaInputSq" placeholder="?" required style="width: 60px; text-align: center;">
                    </div>
                </div>

                <button type="submit" class="submit-btn-sq">ВІДПРАВИТИ ЗАЯВКУ</button>
            </form>
        </div>
    </div>
</section>

<script src="script2.js"></script>
<script>
    /* Переопределение логики редиректа после успеха */
    const originalFetch = window.fetch;
    // Мы не переписываем скрипт полностью, просто добавим логику в основной обработчик в script2.js
</script>
</body>
</html>
